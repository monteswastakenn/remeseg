<aside class="sidebar-wrapper" [class.collapsed]="collapsed">
    <div class="sidebar-header">
        <div class="brand">
            <div class="brand-icon">
                <i class="pi pi-shield"></i>
            </div>
            <h3 *ngIf="!collapsed" class="brand-text">ERP Tickets</h3>
        </div>
    </div>

    <ul class="sidebar-nav">

        <!-- Dashboard -->
        <li>
            <a routerLink="/home/dashboard" routerLinkActive="active"
               [pTooltip]="collapsed ? 'Dashboard' : ''" tooltipPosition="right">
                <i class="pi pi-home"></i>
                <span *ngIf="!collapsed">Dashboard</span>
            </a>
        </li>

        <!-- Mi Perfil -->
        <li>
            <a routerLink="/home/users" routerLinkActive="active"
               [pTooltip]="collapsed ? 'Mi Perfil' : ''" tooltipPosition="right">
                <i class="pi pi-user"></i>
                <span *ngIf="!collapsed">Mi Perfil</span>
            </a>
        </li>

        <li class="nav-divider" *ngIf="!collapsed">
            <span class="nav-section">Gestión</span>
        </li>

        <!-- Grupos -->
        <li *appHasPermission="'group:view'">
            <a routerLink="/home/groups" routerLinkActive="active"
               [pTooltip]="collapsed ? 'Grupos' : ''" tooltipPosition="right">
                <i class="pi pi-sitemap"></i>
                <span *ngIf="!collapsed">Grupos</span>
            </a>
        </li>

        <!-- Gestión Usuarios (solo admin) -->
        <li *appHasPermission="'user:view'">
            <a routerLink="/home/admin-users" routerLinkActive="active"
               [pTooltip]="collapsed ? 'Gestión Usuarios' : ''" tooltipPosition="right">
                <i class="pi pi-users"></i>
                <span *ngIf="!collapsed">Gestión Usuarios</span>
            </a>
        </li>

    </ul>

    <div class="sidebar-footer">
        <button *ngIf="!collapsed" pButton type="button" label="Cerrar sesión" icon="pi pi-sign-out"
            severity="secondary" class="w-full" (click)="logout()"></button>

        <button *ngIf="collapsed" pButton type="button" icon="pi pi-sign-out" severity="secondary" class="w-full"
            (click)="logout()" aria-label="Cerrar sesión" pTooltip="Cerrar sesión" tooltipPosition="right">
        </button>
        <div *ngIf="!collapsed" class="version-tag">v1.0.0</div>
    </div>
</aside>
