<aside class="sidebar" [class.is-collapsed]="collapsed">
    <div class="top">
        <button class="toggle" type="button" (click)="onToggle?.()" aria-label="Toggle sidebar">
            <i class="pi pi-bars"></i>
        </button>

        <div class="brand" *ngIf="!collapsed">
            <div class="logo">ERP</div>
            <div class="subtitle">Panel</div>
        </div>
    </div>

    <nav class="menu">
        <!-- 1. Dashboard -->
        <a routerLink="/home/dashboard" routerLinkActive="active" class="item">
            <i class="pi pi-home"></i>
            <span class="label" *ngIf="!collapsed">Dashboard</span>
        </a>

        <a *ngIf="canView('user:view') || canView('users:view')" routerLink="/home/users" routerLinkActive="active"
            class="item">
            <i class="pi pi-user"></i>
            <span class="label" *ngIf="!collapsed">Mi Perfil</span>
        </a>

        <!-- 3. Admin Users (Super Admin only for now, though logic can be tailored) -->
        <a *ngIf="canView('users:view')" routerLink="/home/admin-users" routerLinkActive="active"
            class="item">
            <i class="pi pi-users"></i>
            <span class="label" *ngIf="!collapsed">Gestión Usuarios</span>
        </a>

        <!-- 3. Tickets -->
        <a *ngIf="canView('ticket:view')" routerLink="/home/tickets" routerLinkActive="active" class="item">
            <i class="pi pi-ticket"></i>
            <span class="label" *ngIf="!collapsed">Tickets</span>
        </a>

        <!-- 4. Groups Section (Dropdown) -->
        <div *ngIf="canView('group:view')" class="menu-group">
            <div class="item" (click)="toggleGroupsMenu()" [class.active]="groupsMenuExpanded">
                <i class="pi pi-sitemap"></i>
                <div class="item-label-container" *ngIf="!collapsed">
                    <span class="label">Groups Section</span>
                    <i class="pi pi-chevron-down chevron" [class.open]="groupsMenuExpanded"></i>
                </div>
            </div>

            <div class="submenu" *ngIf="groupsMenuExpanded && !collapsed">
                <a routerLink="/home/groups" routerLinkActive="active" class="sub-item">
                    <i class="pi pi-list"></i>
                    <span>Groups</span>
                </a>
                <a routerLink="/home/group-tickets" routerLinkActive="active" class="sub-item">
                    <i class="pi pi-th-large"></i>
                    <span>Groups (Tickets)</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="bottom">
        <!-- cuando NO está colapsado: botón normal -->
        <button *ngIf="!collapsed" pButton type="button" label="Cerrar sesión" icon="pi pi-sign-out"
            severity="secondary" class="w-full" (click)="logout()"></button>

        <!-- cuando está colapsado: solo icono -->
        <button *ngIf="collapsed" class="logout-icon" type="button" (click)="logout()" aria-label="Cerrar sesión"
            title="Cerrar sesión">
            <i class="pi pi-sign-out"></i>
        </button>
    </div>
</aside>
