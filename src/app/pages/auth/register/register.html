<p-toast></p-toast>

<div class="auth-wrap">
    <p-card header="Registro de Cuenta">
        <form [formGroup]="form" (ngSubmit)="submit()" class="form">
            <div class="grid">

                <!-- Usuario -->
                <div class="field">
                    <label>Usuario</label>
                    <input pInputText formControlName="username" placeholder="Nombre de usuario" />
                    <small class="error" *ngIf="form.controls['username'].touched && form.controls['username'].invalid">
                        Usuario obligatorio.
                    </small>
                </div>

                <!-- Nombre completo -->
                <div class="field">
                    <label>Nombre completo</label>
                    <input pInputText formControlName="fullName" placeholder="Ej: Juan Pérez" />
                    <small class="error" *ngIf="form.controls['fullName'].touched && form.controls['fullName'].invalid">
                        Nombre completo obligatorio.
                    </small>
                </div>

                <!-- Email -->
                <div class="field full-width">
                    <label>Email</label>
                    <input pInputText type="email" formControlName="email" placeholder="correo@ejemplo.com" />
                    <small class="error" *ngIf="form.controls['email'].touched && form.controls['email'].invalid">
                        Ingresa un email válido.
                    </small>
                </div>

                <!-- Contraseña -->
                <div class="field">
                    <label>Contraseña</label>
                    <p-password formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="Contraseña"></p-password>
                    <small class="error" *ngIf="form.controls['password'].touched && form.controls['password'].invalid">
                        Mínimo 6 caracteres.
                    </small>
                </div>

                <!-- Confirmar contraseña -->
                <div class="field">
                    <label>Confirmar contraseña</label>
                    <p-password formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" placeholder="Repite contraseña"></p-password>
                    <small class="error" *ngIf="form.touched && form.errors?.['mismatch']">
                        Las contraseñas no coinciden.
                    </small>
                </div>

            </div>

            <!-- Botones -->
            <div class="form-actions" style="margin-top: 1rem;">
                <button pButton type="submit" label="Crear mi cuenta" class="p-button-lg" style="width: 100%;" [disabled]="form.invalid"
                    [loading]="loading">
                </button>

                <div class="login-link" style="text-align: center; margin-top: 1rem; color: #64748b; font-size: 0.9rem;">
                    <span>¿Ya tienes cuenta?</span>
                    <a routerLink="/login" style="margin-left: 0.5rem; color: #14b8a6; font-weight: 600; text-decoration: none;">Ir al Login</a>
                </div>
            </div>

        </form>
    </p-card>
</div>
