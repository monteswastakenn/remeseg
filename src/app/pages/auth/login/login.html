<p-toast></p-toast>
<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #f8fafc; padding: 1rem;">
    <p-card header="Inicia Sesión" [style]="{ 'width': '100%', 'max-width': '400px' }">
        <form [formGroup]="form" (ngSubmit)="submit()" style="display: flex; flex-direction: column; gap: 1.5rem;">
            
            <p-message *ngIf="isBlocked" severity="error" styleClass="w-full">
                <ng-template pTemplate="content">
                    <span class="ml-2">Bloqueado: {{ countdown }}s restantes</span>
                </ng-template>
            </p-message>

            <div class="flex flex-column gap-2">
                <label style="font-weight: 600;">Usuario / Email</label>
                <input pInputText type="email" formControlName="email" placeholder="Ingresa tu correo" style="width: 100%;" />
                <small *ngIf="form.controls['email'].touched && form.controls['email'].invalid" style="color: red;">
                    Correo inválido
                </small>
            </div>

            <div class="flex flex-column gap-2">
                <label style="font-weight: 600;">Contraseña</label>
                <p-password formControlName="password" [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full" placeholder="••••••••"></p-password>
                <small *ngIf="form.controls['password'].touched && form.controls['password'].invalid" style="color: red;">
                    Contraseña obligatoria
                </small>
            </div>

            <p-button type="submit" [label]="isBlocked ? 'Bloqueado (' + countdown + 's)' : 'Ingresar'" [loading]="loading" [disabled]="isBlocked" styleClass="w-full"></p-button>

            <div style="text-align: center; margin-top: 1rem;">
                <a routerLink="/register" style="color: #2563eb; text-decoration: none;">¿No tienes cuenta? Registrate</a>
            </div>
        </form>
    </p-card>
</div>
