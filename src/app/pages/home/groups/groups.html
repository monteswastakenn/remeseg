<p-toast></p-toast>

<div class="page-container">
    <header class="header">
        <div>
            <h2>Groups</h2>
            <p>Gestión de grupos.</p>
        </div>
    </header>

    <!-- Skeleton mientras carga -->
    @if (loading()) {
        <p-card class="card" header="Lista de grupos">
            <p-skeleton height="2rem" styleClass="mb-2"></p-skeleton>
            <p-skeleton height="2rem" styleClass="mb-2"></p-skeleton>
            <p-skeleton height="2rem"></p-skeleton>
        </p-card>
    } @else {
        <p-card class="card" header="Lista de grupos">
            <div class="toolbar">
                <span class="p-input-icon-left">
                    <i class="pi pi-search"></i>
                    <input pInputText [(ngModel)]="q" placeholder="Buscar grupo..." />
                </span>

                <button *appHasPermission="'group:create'" pButton type="button" label="Nuevo grupo"
                    icon="pi pi-plus" (click)="openCreate()"></button>
            </div>

            <p-table [value]="filtered()" [paginator]="true" [rows]="7" [rowsPerPageOptions]="[7,10,20]"
                [tableStyle]="{ 'min-width': '100%' }" styleClass="p-datatable-sm">

                <ng-template pTemplate="header">
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Integrantes</th>
                        <th>Tickets</th>
                        <th style="width: 200px;">Acciones</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-row>
                    <tr>
                        <td class="gname" style="cursor: pointer;" (click)="viewTickets(row)">
                            <span class="badge"><i class="pi pi-sitemap"></i></span>
                            <div class="gmeta">
                                <span class="title" style="color: var(--primary-color);">{{ row.name }}</span>
                            </div>
                        </td>

                        <td>{{ row.description }}</td>
                        <td>{{ row.memberCount }}</td>
                        <td>{{ row.ticketCount }}</td>

                        <td>
                            <div class="actions">
                                <button pButton type="button" icon="pi pi-ticket" severity="info" rounded
                                    title="Ver tickets" (click)="viewTickets(row)"></button>
                                <button *appHasPermission="'group:edit'" pButton type="button"
                                    icon="pi pi-pencil" severity="secondary" rounded (click)="openEdit(row)"></button>
                                <button *appHasPermission="'group:delete'" pButton type="button"
                                    icon="pi pi-trash" severity="danger" rounded (click)="remove(row)"></button>
                            </div>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="5" class="text-center p-4">No se encontraron grupos.</td>
                    </tr>
                </ng-template>
            </p-table>
        </p-card>
    }
</div>

<p-dialog [(visible)]="dialogOpen" [modal]="true" [draggable]="false" [resizable]="false"
    [style]="{ width: '520px', maxWidth: '92vw' }" [header]="isEdit ? 'Editar grupo' : 'Nuevo grupo'">

    <div class="dlgGrid">
        <div class="field full">
            <label>Nombre</label>
            <input pInputText [(ngModel)]="draft.name" placeholder="Nombre del grupo" />
        </div>

        <div class="field full">
            <label>Descripción</label>
            <textarea pTextarea [(ngModel)]="draft.description" rows="3" placeholder="Descripción del grupo"></textarea>
        </div>
    </div>

    <div class="dlgActions">
        <button pButton type="button" label="Cancelar" severity="secondary" (click)="dialogOpen=false"></button>
        <button pButton type="button" label="Guardar" icon="pi pi-check" (click)="save()"></button>
    </div>
</p-dialog>
